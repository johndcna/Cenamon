name: CI-CD

on:
  workflow_dispatch:
  push:
    branches:
      - master # master environment
      # - release # staging and production 


jobs:
  test-variable:
    runs-on: ubuntu-latest
    steps:
    - name: Generate APP_NAME
      run: |
        ls -alFh
        VARS_JSON='${{ toJson(vars) }}'
        APP_NAME=$(echo "$VARS_JSON" | jq -r ".${{ inputs.target_app_service }}")
        echo "::notice::APP_NAME=$APP_NAME"
        echo "APP_NAME=$APP_NAME" >> $GITHUB_ENV     
        
    - name: Echo AZURE_WEBAPP_NAME
      run: |
            echo "This is a secret: ${{ env.AZURE_WEBAPP_NAME }}"
  
  build-core-api:
    uses: johndcna/reusable-workflows/.github/workflows/build-dotnet.yml@main
    with:
      dotnet_version: 8.x
      artifact_name: $APP_NAMEss
      project_file: 'Cenamon/Cenamon.WebAPI.csproj'
      path: 'Cenamon/artifact/content'
      
  deploy-core-api:
    needs: [build-core-api]
    uses: johndcna/reusable-workflows/.github/workflows/deploy-.net-to-azure-web-app.yml@main
    with:
      artifact_name: 'Cenamon.WebAPI'
      target_app_name: ${{ vars.AZURE_WEBAPP_NAME }}
      target_publish_profile: ${{ vars.AZURE_WEBAPP_PUBLISH_PROFILE }}
    secrets:
      azure_client_id: ${{ secrets.AZURE_CLIENT_ID }}
      azure_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
      subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      
