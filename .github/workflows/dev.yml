name: Dev
  
on:
  workflow_dispatch:
    inputs:
      environment:
        type: string
        required: true
env:
  deploy-a: ${{ vars.AZURE_WEBAPP_NAME  }}
  deploy-b: ${{ vars.b }}
  
jobs:
  print:
    runs-on: ubuntu-latest
    outputs:
      some_var: ${{ steps.step1.outputs.some_var }}
      another_var: ${{ steps.step1.outputs.another_var }}  
  do-something:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Print inputs passed to the reusable workflow
        id: step1
        run: |
          echo "some var: $SOME_VAR"
          echo "some_var=$SOME_VAR" >> $GITHUB_OUTPUT
          echo "another var: $ANOTHER_VAR"
          echo "another_var=$ANOTHER_VAR" >> $GITHUB_OUTPUT
          
  test-reusable:
    needs:
      - print
    uses: johndcna/reusable-workflows/.github/workflows/test.yml@main
    with:
      fname:  ${{ env.deploy-a }}
      path: ${{ needs.print.outputs.some_var }}
      
